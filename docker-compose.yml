services:
  # 🧱 BACKEND ADONIS
  adonis:
    build:
      context: ./backend
    container_name: adonis_backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    networks:
      - portfolio_net

  # 🌐 FRONTEND NUXT
  frontend:
    build:
      context: ./frontend
    container_name: nuxt_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:3333/api
    depends_on:
      - adonis
    command: npm run dev
    networks:
      - portfolio_net

networks:
  portfolio_net:
