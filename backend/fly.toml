# fly.toml app configuration file generated for portfolioraissa on 2025-12-12T23:10:35+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'portfolioraissa'
primary_region = 'iad'

[build]
  dockerfile = './Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3333'

[processes]
  app = 'node build/server.js'

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
